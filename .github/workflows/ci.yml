name: CI

on:
  push:
    paths:
      - 'subs2srs/**/*.cs'
      - 'subs2srs/subs2srs.csproj'
      - 'subs2srs.Tests/**/*.cs'
      - 'subs2srs.Tests/subs2srs.Tests.csproj'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'subs2srs/**/*.cs'
      - 'subs2srs/subs2srs.csproj'
      - 'subs2srs.Tests/**/*.cs'
      - 'subs2srs.Tests/subs2srs.Tests.csproj'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
      - run: dotnet build subs2srs/subs2srs.csproj -c Release
      - run: dotnet test subs2srs.Tests/subs2srs.Tests.csproj -c Release
